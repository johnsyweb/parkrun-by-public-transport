name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Type check
        run: aube run typecheck

      - name: Validate public data files
        run: aube run validate:public-data

      - name: Lint
        run: aube run lint

      - name: Test
        run: aube test

      - name: Lighthouse
        run: aube run test:lighthouse

      - name: Format check
        run: aube run format:check

  build:
    runs-on: ubuntu-latest
    needs: check

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download public data (parkrun + Transport Victoria)
        run: bash scripts/fetch-public-data.sh

      - name: Validate downloaded data
        run: aube run validate:public-data

      - name: Build (icons, TypeScript, sitemap, Vite)
        run: aube run build
        env:
          NODE_ENV: production

      - name: Install Playwright browsers
        run: aube exec playwright install chromium

      - name: Generate OG image
        run: aube run generate:screenshot

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
        with:
          path: ./dist

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
